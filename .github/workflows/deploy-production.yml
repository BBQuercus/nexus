name: Deploy Production

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  deploy:
    uses: ./.github/workflows/railway-deploy.yml
    with:
      deploy_environment: production
      railway_project_id: ${{ vars.RAILWAY_PROJECT_ID_PRODUCTION }}
      backend_service: ${{ vars.RAILWAY_BACKEND_SERVICE_PRODUCTION }}
      frontend_service: ${{ vars.RAILWAY_FRONTEND_SERVICE_PRODUCTION }}
      frontend_url: ${{ vars.PRODUCTION_FRONTEND_URL }}
      backend_url: ${{ vars.PRODUCTION_BACKEND_URL }}
    secrets:
      railway_token: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
