global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: nexus-backend
    scheme: https
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - nexus.example.com
        labels:
          project: nexus
          environment: production

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          app: prometheus
