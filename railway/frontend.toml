[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.frontend"
watchPatterns = [
  "frontend/**",
  ".env.example",
  "railway.toml",
]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
runtime = "V2"
overlapSeconds = 30
drainingSeconds = 30

[environments.production.deploy]
numReplicas = 2

[environments.staging.deploy]
numReplicas = 1
