[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.backend"
watchPatterns = [
  "backend/**",
  "migrations/**",
  "pyproject.toml",
  "uv.lock",
  "alembic.ini",
  ".env.example",
  "railway.toml",
]

[deploy]
healthcheckPath = "/ready"
healthcheckTimeout = 120
preDeployCommand = "./scripts/run_backend_migrations.sh"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
runtime = "V2"
overlapSeconds = 30
drainingSeconds = 30

[environments.production.deploy]
numReplicas = 2

[environments.staging.deploy]
numReplicas = 1
